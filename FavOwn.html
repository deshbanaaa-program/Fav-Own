<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin · Kelola Favorit</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.4s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        :root {
            --bg: #faf3e8;
            --text: #2e241f;
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-border: rgba(210, 180, 140, 0.3);
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.08), 0 8px 20px rgba(0, 0, 0, 0.06);
            --accent: #c7a05b;
            --accent-light: #e4d5b6;
            --header-bg: rgba(255, 255, 255, 0.5);
            --input-bg: rgba(255,255,240,0.6);
        }

        body.dark {
            --bg: #1a1c1e;
            --text: #edeae5;
            --card-bg: rgba(30, 30, 35, 0.8);
            --card-border: rgba(200, 170, 120, 0.2);
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            --accent: #d4af37;
            --accent-light: #3a3128;
            --header-bg: rgba(20, 20, 22, 0.7);
            --input-bg: rgba(40,40,45,0.8);
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--card-border);
            border-radius: 3rem;
            padding: 2rem;
            box-shadow: var(--shadow);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            background: var(--header-bg);
            padding: 0.8rem 1.5rem;
            border-radius: 4rem;
            backdrop-filter: blur(5px);
            border: 1px solid var(--card-border);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--accent);
        }
        .logo i {
            margin-right: 8px;
        }

        #theme-toggle {
            background: none;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            color: var(--accent);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            transition: all 0.3s;
        }
        #theme-toggle:hover {
            transform: scale(1.1) rotate(10deg);
            background: var(--accent-light);
        }

        h2 {
            font-family: 'Playfair Display', serif;
            margin-bottom: 1.5rem;
            font-size: 2rem;
            color: var(--accent);
            border-left: 6px solid var(--accent);
            padding-left: 1rem;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .tab {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text);
            padding: 0.9rem 2rem;
            border-radius: 3rem;
            font-size: 1.1rem;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: 0.2s;
            font-weight: 500;
        }
        .tab.active {
            background: var(--accent);
            color: #1a1c1e;
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent);
        }

        .admin-panel {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 2.5rem;
            padding: 2rem;
        }

        .item-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 2rem;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }
        .item-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: var(--input-bg);
            padding: 0.8rem 1.2rem;
            border-radius: 3rem;
            border: 1px solid var(--card-border);
        }
        .item-row img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent);
        }
        .item-row i {
            font-size: 2rem;
            color: var(--accent);
            width: 48px;
            text-align: center;
        }
        .item-row span {
            flex: 1;
            font-weight: 500;
        }
        .delete-btn {
            background: none;
            border: none;
            font-size: 1.3rem;
            color: #d46b5e;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .delete-btn:hover {
            background: rgba(255, 100, 100, 0.2);
            transform: scale(1.1);
        }

        .add-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1.5rem;
            border-top: 1px dashed var(--card-border);
            padding-top: 1.8rem;
        }
        .form-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .form-group input {
            flex: 1 1 200px;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 3rem;
            padding: 1rem 1.5rem;
            font-size: 1rem;
            color: var(--text);
            outline: none;
            transition: 0.2s;
        }
        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(199,160,91,0.2);
        }
        .add-btn {
            background: var(--accent);
            border: none;
            color: #2e241f;
            font-weight: 600;
            padding: 1rem 2rem;
            border-radius: 3rem;
            cursor: pointer;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            transition: 0.2s;
            border: 1px solid var(--accent);
        }
        .add-btn:hover {
            background: transparent;
            color: var(--accent);
            border-color: var(--accent);
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--footer-text, #8b7a6b);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo"><i class="fas fa-crown"></i> Admin Panel</div>
            <button id="theme-toggle"><i class="fas fa-moon"></i></button>
        </header>

        <h2>✨ kelola favoritmu</h2>

        <div class="tabs">
            <button class="tab active" data-cat="songs">🎵 Lagu</button>
            <button class="tab" data-cat="words">📜 Kata</button>
            <button class="tab" data-cat="apps">📱 Aplikasi</button>
        </div>

        <div class="admin-panel" id="adminPanel">
            <!-- daftar item akan diisi javascript -->
            <div id="itemsContainer" class="item-list"></div>

            <div class="add-form">
                <div class="form-group">
                    <input type="text" id="itemName" placeholder="Nama (contoh: Bohemian Rhapsody)" />
                    <input type="url" id="itemImage" placeholder="URL Gambar (opsional)" />
                </div>
                <button class="add-btn" id="addItemBtn"><i class="fas fa-plus-circle"></i> Tambah Item</button>
            </div>
        </div>

        <footer>Design by Deshbanaaa 🔥</footer>
    </div>

    <script>
        (function() {
            // inisialisasi data
            if (!localStorage.getItem('favorites')) {
                const sample = {
                    songs: [
                        { name: 'Bohemian Rhapsody', image: 'https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=100&h=100&fit=crop' },
                        { name: 'Blinding Lights', image: 'https://images.unsplash.com/photo-1500462918059-b1a0cb512f1d?w=100&h=100&fit=crop' }
                    ],
                    words: [
                        { name: 'Hanya hari ini', image: 'https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?w=100&h=100&fit=crop' },
                        { name: 'This too shall pass', image: 'https://images.unsplash.com/photo-1474932430478-367dbb6832c1?w=100&h=100&fit=crop' }
                    ],
                    apps: [
                        { name: 'Spotify', image: 'https://images.unsplash.com/photo-1611339555312-b6078e92df4a?w=100&h=100&fit=crop' },
                        { name: 'Notion', image: 'https://images.unsplash.com/photo-1581291518633-83b4ebd1d83e?w=100&h=100&fit=crop' }
                    ]
                };
                localStorage.setItem('favorites', JSON.stringify(sample));
            }

            // tema
            const themeToggle = document.getElementById('theme-toggle');
            const iconTheme = themeToggle.querySelector('i');
            const body = document.body;
            if (localStorage.getItem('theme') === 'dark') {
                body.classList.add('dark');
                iconTheme.className = 'fas fa-sun';
            } else {
                iconTheme.className = 'fas fa-moon';
            }
            themeToggle.addEventListener('click', () => {
                body.classList.toggle('dark');
                if (body.classList.contains('dark')) {
                    iconTheme.className = 'fas fa-sun';
                    localStorage.setItem('theme', 'dark');
                } else {
                    iconTheme.className = 'fas fa-moon';
                    localStorage.setItem('theme', 'light');
                }
                themeToggle.style.transform = 'scale(1.2)';
                setTimeout(() => themeToggle.style.transform = '', 200);
            });

            // tab aktif & kategori sekarang
            const tabs = document.querySelectorAll('.tab');
            let currentCategory = 'songs';

            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentCategory = tab.dataset.cat;
                    renderItems(currentCategory);
                });
            });

            const itemsContainer = document.getElementById('itemsContainer');
            const itemNameInput = document.getElementById('itemName');
            const itemImageInput = document.getElementById('itemImage');
            const addBtn = document.getElementById('addItemBtn');

            function getData() {
                return JSON.parse(localStorage.getItem('favorites')) || { songs: [], words: [], apps: [] };
            }

            function saveData(data) {
                localStorage.setItem('favorites', JSON.stringify(data));
            }

            function renderItems(category) {
                const data = getData();
                const items = data[category] || [];
                itemsContainer.innerHTML = '';

                if (items.length === 0) {
                    itemsContainer.innerHTML = '<div style="text-align:center; padding:2rem; opacity:0.7;">✨ belum ada item, tambahkan yang baru ✨</div>';
                    return;
                }

                items.forEach((item, index) => {
                    const row = document.createElement('div');
                    row.className = 'item-row';

                    // gambar atau ikon
                    if (item.image && item.image.trim() !== '') {
                        row.innerHTML += `<img src="${item.image}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/48?text=?'">`;
                    } else {
                        row.innerHTML += `<i class="fas fa-star"></i>`;
                    }

                    row.innerHTML += `<span>${item.name}</span>`;

                    const delBtn = document.createElement('button');
                    delBtn.className = 'delete-btn';
                    delBtn.innerHTML = '<i class="fas fa-trash"></i>';
                    delBtn.setAttribute('aria-label', 'Hapus');
                    delBtn.addEventListener('click', () => {
                        data[category].splice(index, 1);
                        saveData(data);
                        renderItems(category);
                    });

                    row.appendChild(delBtn);
                    itemsContainer.appendChild(row);
                });
            }

            // tambah item
            addBtn.addEventListener('click', () => {
                const name = itemNameInput.value.trim();
                if (!name) {
                    alert('Nama tidak boleh kosong!');
                    return;
                }
                const image = itemImageInput.value.trim();

                const data = getData();
                data[currentCategory].push({ name, image });
                saveData(data);

                itemNameInput.value = '';
                itemImageInput.value = '';
                renderItems(currentCategory);
            });

            // render awal
            renderItems('songs');
        })();
    </script>
</body>
</html>
